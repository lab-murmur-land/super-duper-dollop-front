<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>42ITIRAF - The Raw Signal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#1a1919", "primary": "#9cff93", "primary-dim": "#00ec3b",
                        "background": "#0e0e0e", "surface": "#0e0e0e", "surface-dim": "#0e0e0e",
                        "surface-container-low": "#131313", "surface-container-lowest": "#000000",
                        "surface-container-high": "#201f1f", "surface-container-highest": "#262626",
                        "surface-bright": "#2c2c2c", "surface-variant": "#262626",
                        "on-background": "#ffffff", "on-surface": "#ffffff",
                        "on-surface-variant": "#adaaaa", "outline": "#777575", "outline-variant": "#494847",
                        "secondary": "#ff7436", "secondary-container": "#a63b00", "secondary-dim": "#ff7436",
                        "error": "#ff7351", "on-primary": "#006413"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Space Grotesk", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: theme('fontFamily.body');
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .ambient-glow { box-shadow: 0 0 40px rgba(156, 255, 147, 0.05); }
        .ghost-border { border: 1px solid rgba(73, 72, 71, 0.15); }
        .thread-line { border-left: 2px solid rgba(73, 72, 71, 0.15); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #262626; }
        details > summary::-webkit-details-marker { display: none; }
        .text-neon-glow { text-shadow: 0 0 10px rgba(156, 255, 147, 0.4); }
        .box-glow { box-shadow: 0 0 40px rgba(156, 255, 147, 0.05); }
    </style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary selection:text-on-primary">
    
    <nav class="fixed top-0 w-full z-50 rounded-none border-b border-[#494847]/15 bg-[#131313] flat shadow-none bg-[#0e0e0e] text-[#00FF41] font-['Space_Grotesk'] tracking-tighter uppercase text-sm flex flex-col w-full">
        <div class="flex justify-between items-center px-4 md:px-8 py-3 w-full relative">
            <a href="index.html" class="text-xl md:text-2xl font-black text-[#00FF41] tracking-[-0.04em] shrink-0 md:mr-12 cursor-pointer hover:bg-[#201f1f] p-2 active:scale-[0.98] transition-transform duration-100 flex gap-2 no-underline items-center">
                42ITIRAF
            </a>
            <div class="hidden md:flex flex-1 justify-start gap-8 h-full items-center pt-2">
                <a href="index.html" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors pb-1 border-b-2 border-transparent hover:bg-[#201f1f] px-2">LAST POSTS</a>
                <a href="top.html" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors pb-1 border-b-2 border-transparent hover:bg-[#201f1f] px-2">TOP POSTS</a>
                <a href="trending.html" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors pb-1 border-b-2 border-transparent hover:bg-[#201f1f] px-2">TRENDING POSTS</a>
                <a href="controversial.html" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors pb-1 border-b-2 border-transparent hover:bg-[#201f1f] px-2">CONTROVERSIAL POSTS</a>
                
            </div>
            
            <!-- Trailing Actions -->
            <div class="flex items-center gap-2 md:gap-6 shrink-0">
                <div class="flex gap-2 md:gap-4">
                    <button id="nav-search-btn" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors hover:bg-[#201f1f] p-2 active:scale-[0.98] transition-transform duration-100 flex items-center justify-center">
                        <span class="material-symbols-outlined">search</span>
                    </button>
                    <a href="login.html" id="nav-account-btn" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors hover:bg-[#201f1f] p-2 active:scale-[0.98] flex items-center justify-center">
                        <span class="material-symbols-outlined">account_circle</span>
                    </a>
                    <a href="profile.html?id=CURRENT_USER" id="nav-profile-btn" style="display:none;" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors hover:bg-[#201f1f] p-2 active:scale-[0.98] flex items-center justify-center">
                        <span class="material-symbols-outlined">person</span>
                    </a>
                    <button id="nav-logout-btn" class="hidden text-error hover:text-error-dim transition-colors hover:bg-[#201f1f] p-2 active:scale-[0.98] flex items-center justify-center" onclick="logoutUser()">
                        <span class="material-symbols-outlined">logout</span>
                    </button>
                </div>
                <a href="new-post.html" id="nav-new-post" style="display:none;" class="md:flex items-center bg-primary text-on-primary font-bold px-6 py-2 hover:bg-primary-dim transition-colors active:scale-[0.98] cursor-pointer">
                    NEW SIGNAL
                </a>
            </div>
        </div>
        <!-- Search Bar Dropdown -->
        <div id="nav-search-bar" class="hidden w-full bg-[#131313] border-t border-[#494847]/15 p-4 flex justify-center shadow-lg">
            <input type="text" placeholder="Trace signal ID, topic, or content..." class="w-full max-w-2xl bg-[#000000] border border-[#494847] text-[#9cff93] font-label text-lg p-3 placeholder:text-[#adaaaa]/30 focus:outline-none focus:border-[#00FF41] transition-colors" />
        </div>
    </nav>


    <main class="flex-grow w-full max-w-4xl mx-auto px-4 sm:px-6 pt-32 pb-24 flex flex-col gap-8 relative">
        <div>
            <a href="index.html" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-label uppercase text-xs tracking-widest w-fit no-underline">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                RETURN_TO_STREAM
            </a>
        </div>
        
        
        <div id="post-skeleton-wrapper" class="w-full">
            <article class="bg-surface-container-low p-6 sm:p-8 flex flex-col gap-6 relative group overflow-hidden">
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 blur-[80px] pointer-events-none transition-opacity opacity-50 group-hover:opacity-100"></div>
                <header class="flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <span id="pd-id" class="bg-secondary-container text-secondary font-label px-2 py-1 text-xs tracking-widest font-bold"></span>
                        <span id="pd-time" class="text-secondary-dim font-label text-xs uppercase tracking-widest"></span>
                    </div>
                </header>
                <h1 id="pd-title" class="font-headline text-3xl font-bold uppercase tracking-tighter text-primary"></h1>
                <div id="pd-content" class="font-body text-lg sm:text-xl text-on-surface leading-relaxed text-pretty"></div>
                <figure id="pd-media" class="w-full bg-surface-container-lowest border-l-4 border-primary mt-2 flex flex-col"></figure>
                <footer class="flex items-center gap-6 mt-4">
                    <button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-label uppercase text-sm group">
                        <span class="material-symbols-outlined text-xl group-hover:text-primary transition-colors">keyboard_arrow_up</span>
                        <span id="pd-upvotes" class="font-bold"></span>
                    </button>
                    <button class="flex items-center gap-2 text-on-surface-variant hover:text-error transition-colors font-label uppercase text-sm">
                        <span class="material-symbols-outlined text-xl">keyboard_arrow_down</span>
                        <span id="pd-downvotes" class="font-bold"></span>
                    </button>
                </footer>
            </article>
            
            <details class="w-full group mt-4 outline-none" open>
                <summary class="flex items-center gap-2 text-primary hover:text-primary-dim transition-colors font-label text-sm uppercase cursor-pointer list-none select-none bg-surface-container-high border border-surface-variant p-4 text-center justify-center outline-none">
                    <span class="material-symbols-outlined text-base group-open:hidden">expand_more</span>
                    <span class="material-symbols-outlined text-base hidden group-open:block">expand_less</span>
                    <span id="pd-toggle-title">DATA STREAM ACTIVE - PRESS TO TOGGLE</span>
                </summary>
                <div class="pt-8 flex flex-col gap-12">
                    <section class="flex flex-col gap-6 font-body">
                        <h2 id="pd-node-count" class="font-headline text-on-surface-variant text-sm tracking-widest uppercase border-b border-surface-variant pb-2">ACTIVE_NODES</h2>
                        <div id="pd-comments" class="flex flex-col gap-3"></div>
                    </section>
        <!-- KEEP INPUT_RESPONSE BLOCK AS IS DOWN HERE -->
        <!-- Input is now at the BOTTOM of the details area -->
                <section id="comment-input-area" class="bg-surface-container-lowest p-1 ghost-border flex flex-col focus-within:border-primary/50 transition-colors mt-8">
                    <div class="bg-surface-dim px-4 py-2 font-label text-xs text-primary uppercase tracking-widest border-b border-surface-variant">
                        &gt; INPUT_RESPONSE (NEW NODE)
                    </div>
                    <textarea class="w-full bg-transparent text-on-surface font-body p-4 outline-none resize-none placeholder:text-on-surface-variant/50" placeholder="Initialize text stream..." rows="3"></textarea>
                    <div class="flex items-center justify-between p-2 bg-surface-container-lowest border-t border-surface-variant/20">
                        <div class="flex gap-2">
                            <button class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded hover:bg-surface-variant/50">
                                <span class="material-symbols-outlined text-xl">image</span>
                            </button>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex items-center gap-2 border border-surface-variant px-3 py-2 bg-surface-dim hover:border-primary transition-colors cursor-pointer" onclick="document.getElementById('captcha-main-comment').click();">
                                <input type="checkbox" id="captcha-main-comment" class="h-4 w-4 bg-transparent border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 cursor-pointer pointer-events-none"/>
                                <label for="captcha-main-comment" class="font-label text-xs uppercase tracking-widest text-on-surface-variant cursor-pointer pointer-events-none select-none">VERIFY HUMAN ORIGIN</label>
                            </div>
                            <button onclick="if(typeof enforceCaptcha === 'function' && !enforceCaptcha('captcha-main-comment')) return; alert('Comment Executed');" class="bg-primary hover:bg-primary-dim text-on-primary font-headline font-bold uppercase tracking-widest px-6 py-2 text-sm transition-colors ml-auto">EXECUTE</button>
                        </div>
                    </div>
                </section>
                
            </div>
        </details>
    </main>
    
    <script>
        function toggleInlineReply(id) {
            const form = document.getElementById('reply-form-' + id);
            if (form) form.classList.toggle('hidden');
        }
        document.addEventListener('DOMContentLoaded', () => {
             if (!localStorage.getItem('activeUser')) {
                 const commentArea = document.getElementById('comment-input-area');
                 commentArea.innerHTML = '<div class="p-8 text-center"><p class="text-error font-headline uppercase font-bold text-lg mb-2">ACCESS_DENIED</p><a href="login.html" class="text-primary hover:underline">Authenticate to transmit</a></div>';
             }
        });
    </script>
<script type="module" src="assets/js/pages/postDetailView.js"></script>
</body>

</html>
