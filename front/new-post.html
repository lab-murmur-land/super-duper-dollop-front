<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>42ITIRAF - The Raw Signal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#1a1919", "primary": "#9cff93", "primary-dim": "#00ec3b",
                        "background": "#0e0e0e", "surface": "#0e0e0e", "surface-dim": "#0e0e0e",
                        "surface-container-low": "#131313", "surface-container-lowest": "#000000",
                        "surface-container-high": "#201f1f", "surface-container-highest": "#262626",
                        "surface-bright": "#2c2c2c", "surface-variant": "#262626",
                        "on-background": "#ffffff", "on-surface": "#ffffff",
                        "on-surface-variant": "#adaaaa", "outline": "#777575", "outline-variant": "#494847",
                        "secondary": "#ff7436", "secondary-container": "#a63b00", "secondary-dim": "#ff7436",
                        "error": "#ff7351", "on-primary": "#006413"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Space Grotesk", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: theme('fontFamily.body');
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .ambient-glow { box-shadow: 0 0 40px rgba(156, 255, 147, 0.05); }
        .ghost-border { border: 1px solid rgba(73, 72, 71, 0.15); }
        .thread-line { border-left: 2px solid rgba(73, 72, 71, 0.15); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #262626; }
        details > summary::-webkit-details-marker { display: none; }
        .text-neon-glow { text-shadow: 0 0 10px rgba(156, 255, 147, 0.4); }
        .box-glow { box-shadow: 0 0 40px rgba(156, 255, 147, 0.05); }
    </style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary selection:text-on-primary">
    
    <nav class="fixed top-0 w-full z-50 rounded-none border-b border-[#494847]/15 bg-[#131313] flat shadow-none bg-[#0e0e0e] text-[#00FF41] font-['Space_Grotesk'] tracking-tighter uppercase text-sm flex flex-col w-full">
        <div class="flex justify-between items-center px-4 md:px-8 py-3 w-full relative">
            <a href="index.html" class="text-xl md:text-2xl font-black text-[#00FF41] tracking-[-0.04em] shrink-0 md:mr-12 cursor-pointer hover:bg-[#201f1f] p-2 active:scale-[0.98] transition-transform duration-100 flex gap-2 no-underline items-center">
                42ITIRAF
            </a>
            <div class="hidden md:flex flex-1 justify-start gap-8 h-full items-center pt-2">
                <a href="index.html" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors pb-1 border-b-2 border-transparent hover:bg-[#201f1f] px-2">LAST POSTS</a>
                <a href="top.html" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors pb-1 border-b-2 border-transparent hover:bg-[#201f1f] px-2">TOP POSTS</a>
                <a href="trending.html" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors pb-1 border-b-2 border-transparent hover:bg-[#201f1f] px-2">TRENDING POSTS</a>
                <a href="controversial.html" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors pb-1 border-b-2 border-transparent hover:bg-[#201f1f] px-2">CONTROVERSIAL POSTS</a>
                
            </div>
            
            <!-- Trailing Actions -->
            <div class="flex items-center gap-2 md:gap-6 shrink-0">
                <div class="flex gap-2 md:gap-4">
                    <button id="nav-search-btn" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors hover:bg-[#201f1f] p-2 active:scale-[0.98] transition-transform duration-100 flex items-center justify-center">
                        <span class="material-symbols-outlined">search</span>
                    </button>
                    <a href="login.html" id="nav-account-btn" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors hover:bg-[#201f1f] p-2 active:scale-[0.98] flex items-center justify-center">
                        <span class="material-symbols-outlined">account_circle</span>
                    </a>
                    <a href="profile.html?id=CURRENT_USER" id="nav-profile-btn" style="display:none;" class="text-[#adaaaa] hover:text-[#00FF41] transition-colors hover:bg-[#201f1f] p-2 active:scale-[0.98] flex items-center justify-center">
                        <span class="material-symbols-outlined">person</span>
                    </a>
                    <button id="nav-logout-btn" class="hidden text-error hover:text-error-dim transition-colors hover:bg-[#201f1f] p-2 active:scale-[0.98] flex items-center justify-center" onclick="logoutUser()">
                        <span class="material-symbols-outlined">logout</span>
                    </button>
                </div>
                <a href="new-post.html" id="nav-new-post" style="display:none;" class="md:flex items-center bg-primary text-on-primary font-bold px-6 py-2 hover:bg-primary-dim transition-colors active:scale-[0.98] cursor-pointer">
                    NEW SIGNAL
                </a>
            </div>
        </div>
        <!-- Search Bar Dropdown -->
        <div id="nav-search-bar" class="hidden w-full bg-[#131313] border-t border-[#494847]/15 p-4 flex justify-center shadow-lg">
            <input type="text" placeholder="Trace signal ID, topic, or content..." class="w-full max-w-2xl bg-[#000000] border border-[#494847] text-[#9cff93] font-label text-lg p-3 placeholder:text-[#adaaaa]/30 focus:outline-none focus:border-[#00FF41] transition-colors" />
        </div>
    </nav>

    <main class="flex-grow w-full max-w-2xl mx-auto px-4 sm:px-6 pt-32 pb-24 flex flex-col gap-8 relative">
        <div id="auth-wall" class="hidden bg-surface-container-low p-8 border border-error">
            <h2 class="text-error font-headline text-2xl font-bold">ACCESS DENIED</h2>
            <p class="text-on-surface-variant mt-2">You must establish a trace session to broadcast.</p>
            <a href="login.html" class="inline-block mt-4 text-primary underline">Authenticate here.</a>
        </div>

        <div id="new-post-form" class="hidden flex flex-col gap-8">
            <div class="flex flex-col gap-2 mb-4">
                <h1 class="font-headline text-4xl md:text-5xl font-bold tracking-tighter text-on-surface">EMIT_SIGNAL</h1>
                <p class="font-label text-on-surface-variant text-sm uppercase tracking-widest bg-surface-container-high p-2 border-l-4 border-primary">
                    Warning: Trace origin is scrambled. All signals are permanent.
                </p>
            </div>

            <section class="bg-surface-container-low p-6 md:p-8 flex flex-col gap-6 relative group box-glow ghost-border">
                <div class="flex flex-col gap-2">
                    <label class="font-label text-xs uppercase tracking-widest text-primary">Signal Title</label>
                    <input class="bg-surface-container-lowest border border-outline-variant text-on-surface font-headline font-bold text-lg p-4 focus:outline-none focus:border-primary transition-colors w-full" placeholder="MAIN_FRAME_BREACH" type="text"/>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-label text-xs uppercase tracking-widest text-primary">Confession Data (Raw Text)</label>
                    <textarea class="bg-surface-container-lowest border border-outline-variant text-on-surface font-body p-4 placeholder:text-on-surface-variant placeholder:opacity-30 focus:outline-none focus:border-primary transition-colors w-full resize-none min-h-[200px]" placeholder="Type your unredacted thought..." rows="6"></textarea>
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Classifications (Comma separated)</label>
                    <input class="bg-surface-container-lowest border border-outline-variant text-primary font-label p-4 placeholder:text-on-surface-variant placeholder:opacity-30 focus:outline-none focus:border-primary transition-colors w-full" placeholder="e.g. WORKPLACE, REGRET, DEBUGGING" type="text"/>
                </div>

                <div class="flex items-center justify-between mt-4">
                    <div class="flex items-center gap-2">
                        <button class="text-on-surface-variant hover:text-primary transition-colors p-2 bg-surface-container flex items-center justify-center gap-2 font-label text-xs uppercase tracking-widest h-10 px-4">
                            <span class="material-symbols-outlined text-base">attach_file</span>
                            Add Media Module
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 border border-surface-variant px-3 py-2 bg-surface-dim hover:border-primary transition-colors cursor-pointer" onclick="document.getElementById('captcha-new-post').click();">
                            <input type="checkbox" id="captcha-new-post" class="h-4 w-4 bg-transparent border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 cursor-pointer pointer-events-none"/>
                            <label for="captcha-new-post" class="font-label text-xs uppercase tracking-widest text-on-surface-variant cursor-pointer pointer-events-none select-none">VERIFY HUMAN ORIGIN</label>
                        </div>
                        <button class="bg-gradient-to-r from-primary to-[#00fc40] text-[#006413] font-headline font-bold uppercase tracking-widest h-12 px-8 hover:brightness-110 transition-all flex items-center gap-2 shadow-[0_0_20px_rgba(156,255,147,0.3)] cursor-pointer hover:scale-[1.02] active:scale-95" onclick="if(typeof enforceCaptcha === 'function' && !enforceCaptcha('captcha-new-post')) return; window.location.href='index.html'">
                            <span>TRANSMIT</span>
                            <span class="material-symbols-outlined text-sm">wifi_tethering</span>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    
<script type="module">
        import { authService } from './assets/js/services/authService.js';
        import { ui } from './assets/js/components/ui.js';
        
        const user = authService.getCurrentUser();
        ui.setupNavbar(user);
        
        if (user) {
            document.getElementById('new-post-form').classList.remove('hidden');
            document.getElementById('new-post-form').classList.add('flex');
        } else {
            document.getElementById('auth-wall').classList.remove('hidden');
        }
        
        window.enforceCaptcha = ui.enforceCaptcha;
        </script>
        
</body>

</html>
